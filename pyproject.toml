[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_theme"
version = "0.2.0"
readme = "README.md"
requires-python = ">=3.13"

dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

[tool.splent]
cli_version = "1.11.0"

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "Theme engine: public shell (dual-shell), design tokens and composable blocks"

[tool.splent.contract.provides]
routes     = ["/admin/appearance", "/admin/menus", "/lang/<code>", "/theme/preview"]
blueprints = []
models     = []
commands   = []
hooks      = ["layout.authenticated_sidebar"]
services   = []
signals    = []
translations = ["es"]
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = ["SPLENT_APP"]
signals  = []

[tool.splent.contract.extensible]
services  = []
templates = ["blocks/hero.html", "public_base.html", "theme/admin/appearance.html", "theme/admin/menus.html", "theme/index.html", "theme/preview.html"]
models    = []
hooks     = ["layout.authenticated_sidebar", "layout.body_start", "layout.footer", "layout.head", "layout.hero", "layout.nav", "layout.scripts"]
routes    = false
